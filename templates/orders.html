<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>발주·입고 현황 — 한씨막국수</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: #f5f6fa; color: #333; }

header {
  background: linear-gradient(135deg,#2b6cb0,#1a4a7c);
  color: white; padding: 16px 32px;
  display: flex; align-items: center; gap: 12px;
}
header h1 { font-size: 1.2rem; font-weight: 700; }
header .nav { margin-left: auto; display: flex; gap: 8px; }
header a {
  color: rgba(255,255,255,0.85); text-decoration: none;
  font-size: 0.85rem; padding: 6px 14px;
  border: 1px solid rgba(255,255,255,0.4); border-radius: 6px;
}
header a:hover { background: rgba(255,255,255,0.15); }

.container { max-width: 1100px; margin: 0 auto; padding: 28px 16px; }

.tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 2px solid #e9ecef; }
.tab {
  padding: 10px 24px; font-size: 0.92rem; font-weight: 600;
  border: none; background: none; cursor: pointer; color: #888;
  border-bottom: 3px solid transparent; margin-bottom: -2px;
  transition: all 0.2s;
}
.tab.active { color: #2b6cb0; border-bottom-color: #2b6cb0; }
.tab:hover { color: #2b6cb0; }

.tab-content { display: none; }
.tab-content.active { display: block; }

.card { background: white; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); overflow: hidden; margin-bottom: 16px; }

table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
th { background: #2b6cb0; color: white; padding: 11px 12px; text-align: left; font-weight: 600; }
td { padding: 11px 12px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #f8fbff; }

.badge {
  display: inline-block; padding: 3px 10px; border-radius: 12px;
  font-size: 0.75rem; font-weight: 700;
}
.badge-green  { background: #e6f4ea; color: #2d7a3e; }
.badge-blue   { background: #EBF4FF; color: #2b6cb0; }
.badge-orange { background: #FFF3E0; color: #b07d00; }
.badge-gray   { background: #f0f0f0; color: #888; }

.expand-row { cursor: pointer; }
.expand-row:hover td { background: #edf7ff !important; }
.detail-row { display: none; }
.detail-row.open { display: table-row; }
.detail-inner { padding: 16px; background: #f8fbff; border-top: 1px dashed #bee3f8; }

.sub-table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
.sub-table th { background: #EBF4FF; color: #2b6cb0; padding: 7px 10px; }
.sub-table td { padding: 7px 10px; border-bottom: 1px solid #e9ecef; }

.empty { text-align: center; color: #aaa; padding: 48px; }

.date-filter { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
.date-filter label { font-size: 0.82rem; font-weight: 600; color: #555; }
.date-filter input { padding: 7px 11px; border: 1.5px solid #e2e8f0; border-radius: 7px; font-size: 0.9rem; outline:none; }
.date-filter input:focus { border-color: #2b6cb0; }
.btn-filter { padding: 7px 18px; background: #2b6cb0; color: white; border: none; border-radius: 7px; font-size: 0.88rem; font-weight: 600; cursor: pointer; }
.btn-filter:hover { opacity: 0.88; }

.summary-bar {
  display: flex; gap: 16px; flex-wrap: wrap;
  background: white; border-radius: 10px; padding: 16px 20px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.07); margin-bottom: 18px;
}
.summary-item { text-align: center; min-width: 100px; }
.summary-item .val { font-size: 1.3rem; font-weight: 700; color: #2b6cb0; }
.summary-item .lbl { font-size: 0.75rem; color: #888; margin-top: 2px; }
</style>
</head>
<body>

<header>
  <span>📋</span>
  <h1>한씨막국수 — 발주·입고 현황</h1>
  <div class="nav">
    <a href="/suppliers">🏪 공급업체 관리</a>
    <a href="/">← 재고관리로</a>
  </div>
</header>

<div class="container">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('orders', this)">📤 발주 내역</button>
    <button class="tab" onclick="switchTab('receives', this)">📥 입고 내역</button>
  </div>

  <!-- 발주 내역 탭 -->
  <div class="tab-content active" id="tab-orders">
    <div id="order-summary" class="summary-bar" style="display:none"></div>
    <div class="card">
      <table>
        <thead>
          <tr>
            <th style="width:40px;"></th>
            <th>발주일시</th>
            <th>공급업체</th>
            <th>분류</th>
            <th>품목 수</th>
            <th>발주 방법</th>
            <th>상태</th>
          </tr>
        </thead>
        <tbody id="order-table">
          <tr><td colspan="7" class="empty">불러오는 중...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- 입고 내역 탭 -->
  <div class="tab-content" id="tab-receives">
    <div id="receive-summary" class="summary-bar" style="display:none"></div>
    <div class="card">
      <table>
        <thead>
          <tr>
            <th style="width:40px;"></th>
            <th>처리일시</th>
            <th>납품일자</th>
            <th>공급업체</th>
            <th>품목 수</th>
            <th style="text-align:right;">합계금액</th>
            <th>메모</th>
          </tr>
        </thead>
        <tbody id="receive-table">
          <tr><td colspan="7" class="empty">불러오는 중...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

function toggleDetail(btn) {
  const row = btn.closest('tr');
  const next = row.nextElementSibling;
  if (!next || !next.classList.contains('detail-row')) return;
  const isOpen = next.classList.contains('open');
  next.classList.toggle('open', !isOpen);
  btn.textContent = isOpen ? '▶' : '▼';
}

// 발주 내역
async function loadOrders() {
  const res = await fetch('/api/orders');
  const logs = await res.json();

  const tbody = document.getElementById('order-table');
  if (!logs.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty">발주 내역이 없습니다</td></tr>';
    return;
  }

  const summary = document.getElementById('order-summary');
  summary.style.display = 'flex';
  summary.innerHTML = `
    <div class="summary-item"><div class="val">${logs.length}</div><div class="lbl">총 발주 건</div></div>
    <div class="summary-item"><div class="val">${[...new Set(logs.map(l=>l.supplier).filter(Boolean))].length}</div><div class="lbl">거래 업체</div></div>
    <div class="summary-item"><div class="val">${logs.filter(l=>l.method==='email').length}</div><div class="lbl">이메일 발주</div></div>
    <div class="summary-item"><div class="val">${logs.filter(l=>l.method==='미발송').length}</div><div class="lbl">미발송</div></div>
  `;

  let rows = '';
  for (const log of logs) {
    const dt = log.timestamp.replace('T', ' ').slice(0, 16);
    const methodBadge = log.method === 'email'
      ? '<span class="badge badge-green">이메일</span>'
      : '<span class="badge badge-gray">미발송</span>';
    const statusBadge = '<span class="badge badge-blue">발주완료</span>';
    const rowId = `ord-${log.id}`;

    const subRows = (log.items || []).map(i =>
      `<tr>
        <td>${i.name}</td>
        <td style="text-align:center;">${i.stock}${i.unit} → 주문 <strong>${i.order_qty}${i.unit}</strong></td>
        <td style="text-align:center;color:#e53e3e;">${i.ratio}%</td>
      </tr>`
    ).join('');

    rows += `
      <tr class="expand-row">
        <td style="text-align:center;"><button onclick="toggleDetail(this)" style="background:none;border:none;cursor:pointer;font-size:1rem;color:#2b6cb0;">▶</button></td>
        <td>${dt}</td>
        <td><strong>${log.supplier || '(미등록)'}</strong></td>
        <td><span class="badge badge-blue">${log.category}</span></td>
        <td>${(log.items || []).length}개</td>
        <td>${methodBadge}</td>
        <td>${statusBadge}</td>
      </tr>
      <tr class="detail-row">
        <td colspan="7" style="padding:0;">
          <div class="detail-inner">
            <table class="sub-table">
              <thead><tr><th>식자재</th><th>재고 현황 → 발주량</th><th>재고율</th></tr></thead>
              <tbody>${subRows}</tbody>
            </table>
          </div>
        </td>
      </tr>`;
  }
  tbody.innerHTML = rows;
}

// 입고 내역
async function loadReceives() {
  const res = await fetch('/api/receive-logs');
  const logs = await res.json();

  const tbody = document.getElementById('receive-table');
  if (!logs.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty">입고 내역이 없습니다</td></tr>';
    return;
  }

  const totalAmt = logs.reduce((s, l) => s + (l.total_amount || 0), 0);
  const summary = document.getElementById('receive-summary');
  summary.style.display = 'flex';
  summary.innerHTML = `
    <div class="summary-item"><div class="val">${logs.length}</div><div class="lbl">총 입고 건</div></div>
    <div class="summary-item"><div class="val">${[...new Set(logs.map(l=>l.supplier).filter(Boolean))].length}</div><div class="lbl">거래 업체</div></div>
    <div class="summary-item"><div class="val">${totalAmt.toLocaleString()}원</div><div class="lbl">총 입고 금액</div></div>
  `;

  let rows = '';
  for (const log of logs) {
    const dt = log.timestamp.replace('T', ' ').slice(0, 16);
    const subRows = (log.items || []).map(i =>
      `<tr>
        <td>${i.name}</td>
        <td style="text-align:center;"><strong>+${i.qty}${i.unit}</strong></td>
        <td style="text-align:right;">${(i.unit_price||0).toLocaleString()}원</td>
        <td style="text-align:right;">${(i.total||0).toLocaleString()}원</td>
        <td style="text-align:center;color:#888;">${i.before}→${i.after}</td>
      </tr>`
    ).join('');

    rows += `
      <tr class="expand-row">
        <td style="text-align:center;"><button onclick="toggleDetail(this)" style="background:none;border:none;cursor:pointer;font-size:1rem;color:#2b6cb0;">▶</button></td>
        <td>${dt}</td>
        <td>${log.date || '-'}</td>
        <td><strong>${log.supplier || '(미기재)'}</strong></td>
        <td>${(log.items || []).length}개</td>
        <td style="text-align:right;font-weight:700;color:#2d7a3e;">${(log.total_amount||0).toLocaleString()}원</td>
        <td style="color:#888;font-size:0.82rem;">${log.memo || '-'}</td>
      </tr>
      <tr class="detail-row">
        <td colspan="7" style="padding:0;">
          <div class="detail-inner">
            <table class="sub-table">
              <thead><tr><th>식자재</th><th>납품량</th><th>단가</th><th>금액</th><th>재고 변화</th></tr></thead>
              <tbody>${subRows}</tbody>
            </table>
          </div>
        </td>
      </tr>`;
  }
  tbody.innerHTML = rows;
}

loadOrders();
loadReceives();
</script>
</body>
</html>
